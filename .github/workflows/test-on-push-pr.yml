name: Test pushes/PRs

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  npm-test:
    name: Run minify.js test
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Checkout repository code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 'lts/*'

      - name: Run tests
        run: cd node.js && npm ci && npm test
